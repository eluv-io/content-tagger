content:
  parts_url: http://192.168.96.203/config?self&qspace=main
  config_url: https://host-154-14-185-98.contentfabric.io/config?self&qspace=main
  live_media_url: https://host-76-74-29-5.contentfabric.io/config?self&qspace=main

tagstore:
  base_url: https://ai.contentfabric.io/tagstore
  
tag_runner:
  poll_interval: 5.0

tag_converter:
  name_mapping:
    asr: Speech to Text
    caption: Object Detection
    celeb: Celebrity Detection
    logo: Logo Detection
    music: Music Detection
    ocr: Optical Character Recognition
    shot: Shot Detection
    llava: LLAVA Caption
  interval: 10
  coalesce_tracks: 
    - asr
    - french_asr
  single_tag_tracks:
    - music_detection
  max_sentence_words: 250

system:
  resources: 
    cpu_juice: 100
    ollama: 3
  gpus: ["gpu", "disabled", "disabled", "disabled", "disabled"]

fetcher:
  author: tagger
  max_downloads: 4

tagger:
  media_dir: data/parts

jobstore:
  base_url: data/jobstore

container_registry:
  base_dir: data/containers
  cache_dir: data/cache
  model_configs:
    llava:
      image: "localhost/llava:latest"
      type: "frame"
      description: Scene Description
      resources: {
        "ollama": 1
      }
    asr:
      image: "localhost/asr:latest"
      type: "audio"
      description: Speech to Text
      resources: {
        "gpu": 1
      }
    euro_asr:
      image: "localhost/multilingual:latest"
      type: "audio"
      description: Multilingual European Speech to Text
      resources: {
        "gpu": 1
      }
    caption:
      image: "localhost/caption:latest"
      type: "frame"
      description: Object Identification
      resources: {
        "gpu": 1
      }
    shot:
      image: "localhost/shot:latest"
      type: "video"
      description: Shot Detection
      resources: {
        "gpu": 1
      }
    celeb:
      image: "localhost/celeb:latest"
      type: "frame"
      description: Celebrity Identification
      resources: {
        "gpu": 1,
        "cpu_juice": 35
      }
    ocr:
      image: "localhost/ocr:latest"
      type: "frame"
      description: OCR
      resources: {
        "gpu": 1
      }
    logo:
      image: "localhost/logo:latest"
      type: "frame"
      description: Logo Identification
      resources: {
        "gpu": 1
      }
    vertical_video:
      image: "localhost/verticalvideo:latest"
      type: "video"
      description: Vertical Video Generation
      resources: {
        "cpu_juice": 40
      }
    music:
      image: "localhost/music:latest"
      type: "audio"
      description: Music Identification
      resources: {
        "cpu_juice": 8
      }
    speaker:
      image: "localhost/speaker:latest"
      type: "audio"
      description: Speaker Identification
      resources: {
        "gpu": 1
      }
      content_aligned: True

track_resolver:
  mapping:
    speaker:
      name: speaker_detection
      label: Speaker Detection
    llava:
      name: llava_caption
      label: LLAVA Caption
    asr:
      name: speech_to_text
      label: Speech to Text
    euro_asr:
      name: euro_asr
      label: Euro ASR
    caption:
      name: object_detection
      label: Object Detection
    shot:
      name: shot_detection
      label: Shot Detection
    celeb:
      name: celebrity_detection
      label: Celebrity Detection
    ocr:
      name: optical_character_recognition
      label: Optical Character Recognition
    logo:
      name: logo_detection
      label: Logo Detection
    music:
      name: music_detection
      label: Music Detection
    breakdance:
      name: breakdance
      label: Breakdance
    test_model:
      name: test_model
      label: Test Model
    qwen:
      name: qwen
      label: Video Summary
    run:
      name: run
      label: Running?
    hit:
      name: hit
      label: Hit?
    hit2s:
      name: hit2s
      label: (sm)Hit?
    celebrate:
      name: celebrate
      label: Celebration?
    delivery:
      name: delivery
      label: Delivery?

user_info_resolver:
  fabric_url: https://main.net955305.contentfabric.io
  user_info_url: https://ai.contentfabric.io/ml/token_info